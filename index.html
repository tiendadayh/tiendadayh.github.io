<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIENDA DAYH - Catálogo Oficial</title>
    <link rel="stylesheet" href="styles.css">
    
    <!-- Librerías de soporte e integración externa -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.socketio.cloud/4.7.5/socketio.min.js"></script>
    <link rel="manifest" href="manifest.json">
    
    <script src="app.js" defer></script>
    <style>
        /* Ajuste de diseño para que el catálogo ocupe el 100% del ancho ahora que no hay carrito lateral */
        .container {
            display: block !important;
            max-width: 1200px;
            margin: 0 auto;
        }
        .productos-seccion {
            width: 100% !important;
        }
        /* Hacer el carrito flotante un poco más llamativo e indicar que es interactivo */
        .carrito-flotante {
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .carrito-flotante:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 24px rgba(168, 85, 247, 0.4);
        }
    </style>
</head>

<body>

    <div class="header-tienda">
        <button id="btn-tema" class="btn-tema" title="Cambiar Tema Oscuro/Claro">☀️</button>
        <img src="imagenes_eventos/logo_inicio.png" alt="TIENDA DAYH" class="img-header-inicio" onerror="this.onerror=null; this.src='https://placehold.co/600x200?text=TIENDA+DAYH'">
    </div>

    <div class="container">
        <div class="productos-seccion">

            <div class="anuncio-container">
                <div class="anuncio-card">
                    <span class="badge-live">Gran Final</span>
                    <div class="anuncio-img-wrapper">
                        <img src="imagenes_eventos/argentina_vs_españa.jpg" alt="Gran Final Argentina vs España" class="anuncio-img" onerror="this.onerror=null; this.src='https://placehold.co/1200x400/1f2937/f9fafb?text=GRAN+FINAL:+ARGENTINA+VS+ESPAÑA'">
                    </div>
                    <div class="anuncio-footer">
                        <h3 class="anuncio-titulo">ARGENTINA vs ESPAÑA</h3>
                        <p class="anuncio-subtitulo">LA GRAN FINAL DEL MUNDIAL DOMINGO 19 DE JULIO 2026 A LA 1:00 PM</p>
                    </div>
                </div>
            </div>

            <div class="eventos-seccion" id="seccion-eventos" style="display: none;">
                <h2>📅 Próximos Eventos y Fechas Especiales</h2>
                <div class="productos-destacados" id="lista-eventos"></div>
            </div>

            <div id="seccion-wishlist" class="wishlist-seccion" style="display: none; margin-bottom: 25px;">
                <h2>❤️ Mi Lista de Deseos <span class="wishlist-badge" id="badge-wishlist">0</span></h2>
                <div class="productos-destacados" id="lista-wishlist"></div>
                <hr style="margin: 20px 0;">
            </div>

            <div id="seccion-destacados" class="destacados-seccion">
                <h2>✨ Productos Destacados y Ofertas</h2>
                <div class="productos-destacados" id="lista-destacados"></div>
            </div>

            <hr style="margin: 30px 0;">

            <div class="buscador-contenedor" style="position: relative;">
                <input type="text" id="buscador" placeholder=" 🔍 ¿Qué estás buscando hoy? Escribe nombre o código...">
                <button id="btn-limpiar-busqueda" class="btn-limpiar-busqueda" style="display: none;">✕</button>
            </div>

            <div class="categorias-barra" id="barra-categorias">
                <button class="btn-categoria activo" data-cat="todas"><span>🌐</span>Todas</button>
                <button class="btn-categoria" data-cat="papeleria"><span>✏️</span>Papelería</button>
                <button class="btn-categoria" data-cat="jugueteria"><span>🧸</span>Juguetería</button>
                <button class="btn-categoria" data-cat="electronica"><span>🔌</span>Electrónica</button>
                <button class="btn-categoria" data-cat="ropa"><span>👕</span>Ropa</button>
                <button class="btn-categoria" data-cat="calzado"><span>👟</span>Calzado</button>
                <button class="btn-categoria" data-cat="accesorios"><span>💍</span>Accesorios</button>
                <button class="btn-categoria" data-cat="manualidades"><span>🎨</span>Manualidades</button>
            </div>

            <div class="productos" id="lista-productos"></div>
        </div>
    </div>

    <!-- El Carrito flotante ahora te redirige a la página completa al hacer clic -->
    <div id="carrito-flotante" class="carrito-flotante" onclick="window.location.href='carrito.html'">
        🛒
        <span id="badge-flotante" class="badge-flotante">0</span>
    </div>

    <button id="btn-back-to-top" class="btn-back-to-top" title="Volver arriba">▲</button>

    <div id="lightbox-modal" class="lightbox-modal" style="display: none;">
        <span class="lightbox-close" onclick="cerrarLightbox()">&times;</span>
        <img class="lightbox-img" id="lightbox-img" src="" alt="Visualizador">
        <div id="lightbox-caption" class="lightbox-caption"></div>
    </div>

    <div id="modal-despacho" class="modal-despacho" style="display: none;">
        <div class="modal-contenido">
            <span class="btn-cerrar-modal" onclick="document.getElementById('modal-despacho').style.display='none'">&times;</span>
            <h2>📦 Resumen de Carga para Despacho</h2>
            <div id="detalle-despacho-productos" class="grid-despacho"></div>
            <div class="modal-acciones">
                <button id="btn-imprimir-despacho" class="btn-modal-print">Imprimir / Guardar PDF</button>
            </div>
        </div>
    </div>
</body>
</html>
