<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIENDA DAYH - Catálogo Oficial</title>
    <link rel="stylesheet" href="styles.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script src="https://cdn.socketio.cloud/4.7.5/socketio.min.js"></script>
    
    <script src="app.js" defer></script>
</head>

<body>

    <div class="header-tienda">
        <button id="btn-tema" class="btn-tema" title="Cambiar Tema Oscuro/Claro">☀️</button>
        <img src="imagenes_eventos/logo_inicio.png" alt="TIENDA DAYH" class="img-header-inicio" onerror="this.onerror=null; this.src='https://placehold.co/600x200?text=TIENDA+DAYH'">
    </div>

    <div class="container">
        <div class="productos-seccion">

            <div class="eventos-seccion" id="seccion-eventos" style="display: none;">
                <h2>📅 Próximos Eventos y Fechas Especiales</h2>
                <div class="productos-destacados" id="lista-eventos"></div>
            </div>

            <div id="seccion-destacados" class="destacados-seccion">
                <h2>✨ Productos Destacados y Ofertas</h2>
                <div class="productos-destacados" id="lista-destacados"></div>
            </div>

            <hr style="margin: 30px 0;">

            <div class="buscador-contenedor">
                <input type="text" id="buscador" placeholder=" 🔍 ¿Qué estás buscando hoy? Escribe nombre o código...">
            </div>

            <div class="categorias-barra" id="barra-categorias">
                <button class="btn-categoria activo" data-cat="todas"><span>🌐</span>Todas</button>
                <button class="btn-categoria" data-cat="papeleria"><span>✏️</span>Papelería</button>
                <button class="btn-categoria" data-cat="jugueteria"><span>🧸</span>Juguetería</button>
                <button class="btn-categoria" data-cat="electronica"><span>🔌</span>Electrónica</button>
                <button class="btn-categoria" data-cat="ropa"><span>👕</span>Ropa</button>
                <button class="btn-categoria" data-cat="calzado"><span>👟</span>Calzado</button>
                <button class="btn-categoria" data-cat="accesorios"><span>💍</span>Accesorios</button>
                <button class="btn-categoria" data-cat="manualidades"><span>🎨</span>Manualidades</button>
            </div>

            <div class="productos" id="lista-productos"></div>
        </div>

        <div class="carrito">
            <div class="carrito-header">
                <h2>Tu Pedido <span class="cart-badge" id="badge-contador">0</span></h2>
                <button id="btn-vaciar" class="btn-danger" style="display: none;">Vaciar</button>
            </div>

            <div id="items-carrito"></div>

            <h3 id="total-carrito" style="font-size: 20px; margin-top: 15px; display: flex; justify-content: space-between;">
                <span>Total:</span> <span id="total-monto">$0.00</span>
            </h3>
            <hr>

            <h3>AGENDAR PEDIDO</h3>
            <p style="color: var(--primary-light); font-size: 13px; font-weight: 600; margin: 8px 0 18px 0;">
                📅 Nota: Solo se agendan pedidos de Lunes a Viernes.
            </p>

            <div class="input-group">
                <label for="fecha">Fecha de entrega:</label>
                <input type="date" id="fecha">
            </div>

            <div class="input-group">
                <label for="hora">Hora aproximada:</label>
                <select id="hora" onfocus="validarHorariosDisponibles()">
                    <option value="09:00 AM">09:00 a. m.</option>
                    <option value="10:00 AM">10:00 a. m.</option>
                    <option value="11:00 AM">11:00 a. m.</option>
                    <option value="12:00 PM">12:00 p. m.</option>
                    <option value="01:00 PM">01:00 p. m.</option>
                    <option value="02:00 PM">02:00 p. m.</option>
                    <option value="03:00 PM">03:00 p. m.</option>
                    <option value="04:00 PM">04:00 p. m.</option>
                    <option value="05:00 PM">05:00 p. m.</option>
                </select>
            </div>

            <div class="input-group">
                <label for="cliente">Nombre del cliente:</label>
                <input type="text" id="cliente" placeholder="Escribe tu nombre completo...">
            </div>

            <div class="input-group">
                <label for="metodo-pago">Método de Pago Preferido:</label>
                <select id="metodo-pago">
                    <option value="Efectivo al entregar">💵 Efectivo al entregar</option>
                    <option value="Transferencia Bancaria">📱 Transferencia Bancaria</option>
                </select>
            </div>

            <button id="btn-enviar-pedido" class="btn">Enviar Pedido por WhatsApp</button>

            <div id="alerta-copiado" class="alerta-exito" style="display: none;"></div>
        </div>
    </div>

    <div id="carrito-flotante" class="carrito-flotante" onclick="document.querySelector('.carrito').scrollIntoView({behavior: 'smooth'})">
        🛒
        <span id="badge-flotante" class="badge-flotante">0</span>
    </div>

    <button id="btn-back-to-top" class="btn-back-to-top" title="Volver arriba">▲</button>

    <div id="lightbox-modal" class="lightbox-modal" style="display: none;">
        <span class="lightbox-close" onclick="cerrarLightbox()">&times;</span>
        <img class="lightbox-img" id="lightbox-img" src="" alt="Visualizador">
        <div id="lightbox-caption" class="lightbox-caption"></div>
    </div>

    <div id="modal-despacho" class="modal-despacho" style="display: none;">
        <div class="modal-contenido">
            <span class="btn-cerrar-modal" onclick="document.getElementById('modal-despacho').style.display='none'">&times;</span>
            <h2>📦 Resumen de Carga para Despacho</h2>
            <div id="detalle-despacho-productos" class="grid-despacho"></div>
            <div class="modal-acciones">
                <button id="btn-imprimir-despacho" class="btn-modal-print">Imprimir / Guardar PDF</button>
            </div>
        </div>
    </div>
</body>
</html>
